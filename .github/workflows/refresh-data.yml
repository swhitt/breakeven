name: Refresh data

# Refresh the live market data: pull fresh figures, commit them, and purge the
# jsDelivr cache so the deployed site (which fetches market.json from that CDN at
# runtime) reflects them promptly. Runs weekly and on demand.
on:
  workflow_dispatch:
  schedule:
    # Freddie Mac PMMS posts Thursdays, so run Friday.
    - cron: "0 12 * * 5"

permissions:
  contents: read

concurrency:
  # Serialize refresh runs so a manual dispatch never races the weekly cron's push.
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      # Needed to commit the refreshed data + history back to the repo.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull fresh market data
        run: npm run fetch-data

      - name: Pull fresh zip data
        # ~128MB Zillow download; non-fatal so a Zillow outage leaves the committed
        # zips.json in place instead of failing the whole refresh.
        continue-on-error: true
        run: npm run fetch-zips

      - name: Re-render top-N ZIP OG cards to Blob
        # Refreshes the per-ZIP OG card images for the top markets and rewrites the
        # zip -> Blob URL manifest. Non-fatal: a failure leaves the committed manifest in
        # place. Needs the Blob token as a repo secret (same value Vercel uses).
        continue-on-error: true
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: npm run render-zip-og

      - name: Commit refreshed data
        # Resilient push: if another run lands first, rebase and retry instead of
        # hard-failing, and never block the cache purge below.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/market.json src/data/history.json src/data/locations.json public/zips.json src/data/zipOg.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Refresh market data (manual)"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
                && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "push attempt ${attempt} failed, retrying..."
            sleep 5
          done
          echo "could not push after 3 attempts"

      - name: Purge jsDelivr cache
        # Best-effort: let the CDN serve the new market.json (the only file fetched
        # live) without waiting out its TTL. Never fail the run over a flaky purge.
        continue-on-error: true
        run: curl -fsS "https://purge.jsdelivr.net/gh/swhitt/breakeven@main/src/data/market.json" || true
