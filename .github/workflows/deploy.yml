name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh live data weekly. Freddie Mac PMMS posts Thursdays, so run Friday.
    - cron: "0 12 * * 5"

permissions:
  contents: read

# Let a running deploy finish; don't pile up redundant ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Needed to commit the refreshed data + accumulating history back to the repo.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull fresh market data
        run: npm run fetch-data

      - name: Persist refreshed data and append history
        # Commit the latest snapshot + the growing time series so history
        # accumulates across runs. Pushes made with GITHUB_TOKEN do not retrigger
        # workflows, so this can't loop. Never fail the deploy over a sync commit.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/market.json src/data/history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Sync market data and append history snapshot"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Resolve base path for Pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
