      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E"

      content="Rent-vs-buy calculator with live mortgage rates, rents, and home prices, and a year-by-year breakdown of the math."
    />
    <meta name="theme-color" content="#faf9f5" />
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
          if (dark) document.querySelector('meta[name="theme-color"]').content = "#131210";
        } catch (e) {}
      })();
    </script>
    <meta property="og:title" content="Breakeven: rent vs. buy, with the math shown" />
    <meta
      property="og:description"
      content="Rent-vs-buy with live mortgage rates, rents, and home prices, and a year-by-year breakdown of the math."
