<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An honest rent-vs-buy calculator that shows its work. Live mortgage rates, rents, and home prices baked in fresh, with a fully transparent model."
    />
    <meta name="theme-color" content="#faf9f5" />
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
          if (dark) document.querySelector('meta[name="theme-color"]').content = "#131210";
        } catch (e) {}
      })();
    </script>
    <meta property="og:title" content="buyorwhatever: rent vs. buy, with the math shown" />
    <meta
      property="og:description"
      content="A free, open rent-vs-buy calculator with live data and a transparent, auditable model."
    />
    <meta property="og:type" content="website" />
    <title>buyorwhatever: rent vs. buy, with the math shown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
